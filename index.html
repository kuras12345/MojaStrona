<!DOCTYPE HTML>
<html lang="pl">
<head>

	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

	<title>Moja strona</title>

	<meta name="description" content="Serwis o starych grach pochodzących z Nintendo Entertainment System" />
	<meta name="keywords" content="gry, komputerowe, retro, nes, konsole, retrogranie, stare gry" />

	<link href="style.css" rel="stylesheet" type="text/css" />
	<link href="jQueryAssets/jquery.ui.core.min.css" rel="stylesheet" type="text/css">
	<link href="jQueryAssets/jquery.ui.theme.min.css" rel="stylesheet" type="text/css">
	<link href="jQueryAssets/jquery.ui.button.min.css" rel="stylesheet" type="text/css">

	<!-- Ikony Tabler dla aplikacji w sieci węzłów -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">

	<style>
		/* Style dla sieci węzłów (Neuron Launcher) */
		.neuron-launcher {
			background: #1a1a1a;
			border-radius: 12px;
			padding: 0;
			margin: 20px auto;
			max-width: 900px;
			position: relative;
			overflow: hidden;
			box-shadow: 0 4px 20px rgba(0,0,0,0.3);
		}
		.neuron-launcher .info {
			position: absolute;
			top: 12px;
			left: 16px;
			z-index: 10;
			font-size: 13px;
			color: #aaa;
			font-family: Arial, sans-serif;
		}
		.neuron-launcher .controls {
			position: absolute;
			top: 12px;
			right: 16px;
			z-index: 10;
			display: flex;
			gap: 8px;
		}
		.neuron-launcher .controls button {
			font-size: 12px;
			padding: 6px 14px;
			background: rgba(255,255,255,0.08);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.15);
			border-radius: 6px;
			cursor: pointer;
			font-family: Arial, sans-serif;
		}
		.neuron-launcher .controls button:hover {
			background: rgba(255,255,255,0.15);
		}
		.neuron-launcher svg {
			width: 100%;
			height: 600px;
			display: block;
			cursor: grab;
		}
		.neuron-launcher svg:active {
			cursor: grabbing;
		}
		.neuron-title {
			text-align: center;
			color: #c34f4f;
			font-family: Arial, sans-serif;
			font-size: 22px;
			margin: 30px 0 10px;
		}
	</style>

	<script src="jQueryAssets/jquery-1.11.1.min.js"></script>
	<script src="jQueryAssets/jquery.ui-1.10.4.button.min.js"></script>
</head>

<body>

	<div class="header" style="text-align: center;">

		<div class="logo">

			<span style="color: #c34f4f">Moja</span>strona
			<div style="clear:both;"></div>
		</div>
	</div>
	<div class="nav">
		<ol>
		<!--	<li><a href="#">Strona główna</a></li> -->
			<li><a href="#">Android</a><ul>

					<li><a href="https://github.com/kuras12345/moje-lfs-projekt/raw/main/nawigacja.apk">Sygnic Truck</a></li>
					<li><a href="#"></a></li>
					<li><a href="#"></a></li>
				</ul>
			</li>
			<li><a href="#">IOS</a>
				<ul>
					<li><a href="https://github.com/kuras12345/moje-lfs-projekt/raw/main/ZoomNotes.ipa">ZoomNotes</a></li>
				</ul>


		</ol>

	</div>

	<div class="content">

		<h2 class="neuron-title">Sieć aplikacji</h2>

		<!-- Sieć węzłów - Neuron Launcher -->
		<div class="neuron-launcher">
			<div class="info">Przeciągnij węzły · scroll = zoom</div>
			<div class="controls">
				<button id="reset-btn">Reset</button>
			</div>
			<svg id="graph"></svg>
		</div>

	</div>

	<!-- D3.js dla sieci węzłów -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
	<script>
	(function() {
		// Kategorie (większe węzły)
		const cats = [
			{ id: 'maps',    label: 'Mapy',       color: '#378ADD' },
			{ id: 'tools',   label: 'Narzędzia',  color: '#7F77DD' },
			{ id: 'editor',  label: 'Edytor',     color: '#1D9E75' },
			{ id: 'travel',  label: 'Podróże',    color: '#D85A30' }
		];

		// Aplikacje (mniejsze węzły z ikonami)
		const apps = [
			{ id: 'a1',  cat: 'maps',   icon: 'map-pin' },
			{ id: 'a2',  cat: 'maps',   icon: 'compass' },
			{ id: 'a3',  cat: 'maps',   icon: 'route' },
			{ id: 'a4',  cat: 'tools',  icon: 'calculator' },
			{ id: 'a5',  cat: 'tools',  icon: 'calendar' },
			{ id: 'a6',  cat: 'tools',  icon: 'clock' },
			{ id: 'a7',  cat: 'tools',  icon: 'bell' },
			{ id: 'a8',  cat: 'editor', icon: 'pencil' },
			{ id: 'a9',  cat: 'editor', icon: 'photo' },
			{ id: 'a10', cat: 'editor', icon: 'palette' },
			{ id: 'a11', cat: 'travel', icon: 'plane' },
			{ id: 'a12', cat: 'travel', icon: 'building' },
			{ id: 'a13', cat: 'travel', icon: 'ticket' },
			{ id: 'a14', cat: 'travel', icon: 'world' }
		];

		const nodes = [
			...cats.map(c => ({ id: c.id, label: c.label, type: 'cat', color: c.color, r: 34 })),
			...apps.map(a => ({ id: a.id, icon: a.icon, type: 'app', color: cats.find(c => c.id === a.cat).color, r: 18 }))
		];

		const links = [];
		apps.forEach(a => links.push({ source: a.cat, target: a.id }));
		// Połączenia między kategoriami
		links.push({ source: 'maps',  target: 'travel' });
		links.push({ source: 'tools', target: 'editor' });
		links.push({ source: 'tools', target: 'maps' });

		const svg = d3.select('#graph');
		const W = svg.node().clientWidth || 900;
		const H = 600;
		svg.attr('viewBox', `0 0 ${W} ${H}`);

		const g = svg.append('g');

		// Zoom i pan
		svg.call(d3.zoom().scaleExtent([0.4, 3]).on('zoom', e => g.attr('transform', e.transform)));

		// Symulacja fizyki
		const sim = d3.forceSimulation(nodes)
			.force('link', d3.forceLink(links).id(d => d.id).distance(d => d.target.type === 'app' ? 70 : 140).strength(0.7))
			.force('charge', d3.forceManyBody().strength(-280))
			.force('center', d3.forceCenter(W / 2, H / 2))
			.force('collide', d3.forceCollide().radius(d => d.r + 8));

		// Linie (krawędzie)
		const link = g.append('g')
			.attr('stroke', 'rgba(255,255,255,0.3)')
			.attr('stroke-opacity', 0.7)
			.selectAll('line').data(links).join('line').attr('stroke-width', 1.2);

		// Węzły
		const node = g.append('g').selectAll('g').data(nodes).join('g')
			.style('cursor', 'grab')
			.call(d3.drag()
				.on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
				.on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
				.on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

		// Kategorie - pigułki z tekstem
		node.filter(d => d.type === 'cat')
			.append('rect')
			.attr('x', -55).attr('y', -16)
			.attr('width', 110).attr('height', 32)
			.attr('rx', 16)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.2)');

		node.filter(d => d.type === 'cat')
			.append('text')
			.attr('text-anchor', 'middle')
			.attr('dy', 5)
			.attr('font-size', 13)
			.attr('font-weight', 500)
			.attr('fill', 'white')
			.attr('font-family', 'Arial, sans-serif')
			.text(d => d.label);

		// Aplikacje - kwadraty z ikonami
		node.filter(d => d.type === 'app')
			.append('rect')
			.attr('x', -18).attr('y', -18)
			.attr('width', 36).attr('height', 36)
			.attr('rx', 9)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.25)');

		node.filter(d => d.type === 'app').each(function(d) {
			const fo = d3.select(this).append('foreignObject')
				.attr('x', -12).attr('y', -12).attr('width', 24).attr('height', 24);
			fo.append('xhtml:div')
				.style('width', '24px').style('height', '24px')
				.style('display', 'flex').style('align-items', 'center').style('justify-content', 'center')
				.style('color', 'white').style('font-size', '18px')
				.html('<i class="ti ti-' + d.icon + '" aria-hidden="true"></i>');
		});

		// Aktualizacja pozycji w każdej klatce
		sim.on('tick', () => {
			link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
				.attr('x2', d => d.target.x).attr('y2', d => d.target.y);
			node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
		});

		// Reset
		document.getElementById('reset-btn').addEventListener('click', () => {
			nodes.forEach(n => { n.fx = null; n.fy = null; });
			sim.alpha(1).restart();
			svg.transition().duration(400).call(
				d3.zoom().transform, d3.zoomIdentity
			);
		});
	})();
	</script>

</body>
</html>
