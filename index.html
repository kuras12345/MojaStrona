<!DOCTYPE HTML>
<html lang="pl">
<head>

	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="theme-color" content="#0d0d0d" />

	<title>Moja strona</title>

	<meta name="description" content="Serwis o starych grach pochodzących z Nintendo Entertainment System" />
	<meta name="keywords" content="gry, komputerowe, retro, nes, konsole, retrogranie, stare gry" />

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">

	<style>
		* {
			-webkit-tap-highlight-color: transparent;
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			user-select: none;
			box-sizing: border-box;
		}
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #0d0d0d;
			overscroll-behavior: none;
			touch-action: none;
		}

		.neuron-launcher {
			position: fixed;
			inset: 0;
			background: radial-gradient(circle at 50% 50%, #1f1f1f 0%, #0a0a0a 100%);
			overflow: hidden;
			z-index: 1;
			touch-action: none;
		}
		.neuron-launcher svg {
			width: 100%;
			height: 100%;
			display: block;
			cursor: grab;
			touch-action: none;
		}
		.neuron-launcher svg:active {
			cursor: grabbing;
		}

		.neuron-tooltip {
			position: fixed;
			background: #fff;
			color: #222;
			padding: 6px 12px;
			border-radius: 6px;
			font-size: 13px;
			font-family: Arial, sans-serif;
			pointer-events: none;
			opacity: 0;
			transition: opacity 0.15s;
			box-shadow: 0 2px 12px rgba(0,0,0,0.5);
			white-space: nowrap;
			z-index: 100;
		}
		.neuron-tooltip.visible {
			opacity: 1;
		}
		.app-clickable {
			cursor: pointer !important;
		}
	</style>
</head>

<body>

	<div class="neuron-launcher">
		<svg id="graph"></svg>
	</div>

	<div class="neuron-tooltip" id="tooltip"></div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
	<script>
	(function() {
		const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

		// ====== KATEGORIE (najwyższy poziom) ======
		const cats = [
			{ id: 'android', label: 'Android', color: '#1D9E75' },
			{ id: 'ios',     label: 'iOS',     color: '#378ADD' }
		];

		// ====== PODKATEGORIE — pomiędzy kategorią a aplikacjami ======
		// Dla każdej kategorii jest jedna podkategoria "Programy"
		const subcats = cats.map(c => ({
			id:    'programy_' + c.id,
			label: 'Programy',
			cat:   c.id,
			color: c.color
		}));

		// ====== APLIKACJE ======
		// Kolejność w tej tablicy = kolejność w łańcuchu (strzałki idą od pierwszej do następnej)
		// Pole `url`  = link do pobrania
		// Pole `name` = nazwa wyświetlana pod ikoną
		// Pole `icon` = ikona z https://tabler-icons.io/ (bez prefiksu "ti-")
		const apps = [
			{
				id:   'ventusky',
				cat:  'android',
				name: 'Ventusky',
				icon: 'cloud',
				url:  'https://github.com/kuras12345/moje-lfs-projekt/raw/main/Ventusky.apk'
			},
			{
				id:   'sygnic',
				cat:  'android',
				name: 'Sygnic Truck',
				icon: 'truck',
				url:  'https://github.com/kuras12345/moje-lfs-projekt/raw/main/nawigacja.apk'
			},
			{
				id:   'zoomnotes',
				cat:  'ios',
				name: 'ZoomNotes',
				icon: 'notes',
				url:  'https://github.com/kuras12345/moje-lfs-projekt/raw/main/ZoomNotes.ipa'
			}
			// Dodaj kolejną apkę kopiując blok powyżej.
			// Strzałki będą szły od kategorii → Programy → pierwsza apka → druga apka → ...
		];

		// ====== BUDOWA ŁAŃCUCHÓW ======
		// Dla każdej kategorii: cat → programy → app1 → app2 → ...
		function chainForCat(catId) {
			const catApps = apps.filter(a => a.cat === catId).map(a => a.id);
			return [catId, 'programy_' + catId, ...catApps];
		}

		// ====== WSZYSTKIE WĘZŁY ======
		// halfW i halfH = połowa szerokości/wysokości prostokąta węzła (do obliczania końca strzałki)
		const nodes = [
			...cats.map(c => ({
				id: c.id, label: c.label, type: 'cat', color: c.color,
				halfW: 70, halfH: 22
			})),
			...subcats.map(s => ({
				id: s.id, label: s.label, type: 'subcat', color: s.color,
				halfW: 55, halfH: 18
			})),
			...apps.map(a => ({
				id: a.id, name: a.name, icon: a.icon, url: a.url,
				type: 'app',
				color: cats.find(c => c.id === a.cat).color,
				halfW: 26, halfH: 26
			}))
		];

		// ====== LINKI (KRAWĘDZIE) — z kierunkiem ======
		const links = [];
		cats.forEach(c => {
			const ch = chainForCat(c.id);
			for (let i = 0; i < ch.length - 1; i++) {
				links.push({ source: ch[i], target: ch[i + 1] });
			}
		});

		// Zamień stringowe id w linkach na referencje do obiektów node
		links.forEach(l => {
			if (typeof l.source === 'string') l.source = nodes.find(n => n.id === l.source);
			if (typeof l.target === 'string') l.target = nodes.find(n => n.id === l.target);
		});

		// ====== SVG ======
		const svg = d3.select('#graph');
		const tooltip = document.getElementById('tooltip');

		function getSize() {
			return { W: window.innerWidth, H: window.innerHeight };
		}
		let { W, H } = getSize();
		svg.attr('viewBox', '0 0 ' + W + ' ' + H);

		// === STRZAŁKA (marker) ===
		const defs = svg.append('defs');
		defs.append('marker')
			.attr('id', 'arrow')
			.attr('viewBox', '0 -5 10 10')
			.attr('refX', 9)        // tip strzałki dokładnie na końcu linii
			.attr('refY', 0)
			.attr('markerWidth', 7)
			.attr('markerHeight', 7)
			.attr('orient', 'auto')
			.attr('markerUnits', 'userSpaceOnUse')
			.append('path')
			.attr('d', 'M0,-5L10,0L0,5')
			.attr('fill', 'rgba(255,255,255,0.65)');

		const g = svg.append('g');

		// === ZOOM + PAN (też pinch na mobile) ===
		const zoom = d3.zoom()
			.scaleExtent([0.3, 3])
			.filter(event => {
				if (event.type === 'wheel') return true;
				if (event.type === 'touchstart' && event.touches.length >= 2) return true;
				if (event.type === 'mousedown') return event.target.tagName === 'svg' || event.target === g.node();
				return false;
			})
			.on('zoom', e => g.attr('transform', e.transform));
		svg.call(zoom);

		// ====== UKŁAD STATYCZNY — kategorie po lewej i prawej, łańcuch w dół ======
		function layoutNodes() {
			const ySpacing = Math.min(110, (H - 160) / Math.max(2, Math.max(...cats.map(c => chainForCat(c.id).length))));
			const startY = Math.max(80, H * 0.13);

			cats.forEach((c, idx) => {
				const ch = chainForCat(c.id);
				// Android = lewa kolumna (0.3 W), iOS = prawa (0.7 W)
				const x = idx === 0 ? W * 0.3 : W * 0.7;
				ch.forEach((id, i) => {
					const n = nodes.find(node => node.id === id);
					if (n) {
						n.x = n.fx = x;
						n.y = n.fy = startY + i * ySpacing;
					}
				});
			});
		}

		// ====== LINIE (krawędzie) ======
		const link = g.append('g')
			.attr('stroke', 'rgba(255,255,255,0.45)')
			.attr('stroke-opacity', 0.8)
			.selectAll('line').data(links).join('line')
			.attr('stroke-width', 1.6)
			.attr('marker-end', 'url(#arrow)');

		// ====== OBLICZANIE KOŃCÓW LINII (żeby strzałka kończyła się na krawędzi prostokąta, nie w jego środku) ======
		function rectEdgeOffset(node, ux, uy) {
			const aux = Math.abs(ux), auy = Math.abs(uy);
			if (aux < 0.001) return node.halfH;
			if (auy < 0.001) return node.halfW;
			const tx = node.halfW / aux;
			const ty = node.halfH / auy;
			return Math.min(tx, ty);
		}
		function endpoints(d) {
			const sx = d.source.x, sy = d.source.y;
			const tx = d.target.x, ty = d.target.y;
			const dx = tx - sx, dy = ty - sy;
			const dist = Math.sqrt(dx * dx + dy * dy);
			if (dist === 0) return { x1: sx, y1: sy, x2: tx, y2: ty };
			const ux = dx / dist, uy = dy / dist;
			const sOff = rectEdgeOffset(d.source, ux, uy);
			const tOff = rectEdgeOffset(d.target, ux, uy) + 6; // +6 = miejsce na grot strzałki
			return {
				x1: sx + ux * sOff,
				y1: sy + uy * sOff,
				x2: tx - ux * tOff,
				y2: ty - uy * tOff
			};
		}

		// ====== DRAG ======
		const DRAG_THRESHOLD = 8;
		const drag = d3.drag()
			.on('start', (e, d) => {
				d._startX = e.x; d._startY = e.y;
				d._dragged = false;
			})
			.on('drag', (e, d) => {
				const dx = e.x - d._startX;
				const dy = e.y - d._startY;
				if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
					d._dragged = true;
				}
				d.x = d.fx = e.x;
				d.y = d.fy = e.y;
				updateLayout();
			});

		// ====== WĘZŁY ======
		const node = g.append('g').selectAll('g').data(nodes).join('g')
			.attr('class', d => d.type === 'app' && d.url ? 'app-clickable' : '')
			.call(drag);

		// --- Kategoria (Android, iOS) ---
		const catSel = node.filter(d => d.type === 'cat');
		catSel.append('rect')
			.attr('x', d => -d.halfW).attr('y', d => -d.halfH)
			.attr('width',  d => d.halfW * 2)
			.attr('height', d => d.halfH * 2)
			.attr('rx', 22)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.2)');
		catSel.append('text')
			.attr('text-anchor', 'middle').attr('dy', 5)
			.attr('font-size', 16).attr('font-weight', 500)
			.attr('fill', 'white').attr('font-family', 'Arial, sans-serif')
			.attr('pointer-events', 'none')
			.text(d => d.label);

		// --- Podkategoria (Programy) ---
		const subSel = node.filter(d => d.type === 'subcat');
		subSel.append('rect')
			.attr('x', d => -d.halfW).attr('y', d => -d.halfH)
			.attr('width',  d => d.halfW * 2)
			.attr('height', d => d.halfH * 2)
			.attr('rx', 18)
			.attr('fill', 'rgba(255,255,255,0.06)')
			.attr('stroke', d => d.color)
			.attr('stroke-width', 1.5);
		subSel.append('text')
			.attr('text-anchor', 'middle').attr('dy', 4)
			.attr('font-size', 13).attr('font-weight', 500)
			.attr('fill', 'white').attr('font-family', 'Arial, sans-serif')
			.attr('pointer-events', 'none')
			.text(d => d.label);

		// --- Aplikacje ---
		const appNodes = node.filter(d => d.type === 'app');

		// Niewidoczna większa strefa kliknięcia dla wygody dotyku
		appNodes.append('rect')
			.attr('x', -32).attr('y', -32)
			.attr('width', 64).attr('height', 64)
			.attr('rx', 14)
			.attr('fill', 'transparent')
			.attr('pointer-events', 'all');

		// Widoczny kwadrat z ikoną
		appNodes.append('rect')
			.attr('x', -26).attr('y', -26)
			.attr('width', 52).attr('height', 52)
			.attr('rx', 13)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.25)')
			.attr('pointer-events', 'none');

		appNodes.each(function(d) {
			const fo = d3.select(this).append('foreignObject')
				.attr('x', -16).attr('y', -16).attr('width', 32).attr('height', 32);
			fo.append('xhtml:div')
				.style('width', '32px').style('height', '32px')
				.style('display', 'flex').style('align-items', 'center').style('justify-content', 'center')
				.style('color', 'white').style('font-size', '26px')
				.style('pointer-events', 'none')
				.html('<i class="ti ti-' + d.icon + '" aria-hidden="true"></i>');
		});

		// Etykieta pod ikoną
		appNodes.append('text')
			.attr('text-anchor', 'middle').attr('dy', 50)
			.attr('font-size', 12).attr('font-weight', 500)
			.attr('fill', 'rgba(255,255,255,0.9)').attr('font-family', 'Arial, sans-serif')
			.attr('pointer-events', 'none')
			.text(d => d.name);

		// ====== INTERAKCJE ======
		if (!isTouch) {
			appNodes
				.on('mouseenter', function(event, d) {
					if (!d.name) return;
					tooltip.textContent = d.name;
					tooltip.style.left = (event.clientX + 14) + 'px';
					tooltip.style.top  = (event.clientY - 32) + 'px';
					tooltip.classList.add('visible');
				})
				.on('mousemove', function(event) {
					tooltip.style.left = (event.clientX + 14) + 'px';
					tooltip.style.top  = (event.clientY - 32) + 'px';
				})
				.on('mouseleave', function() {
					tooltip.classList.remove('visible');
				});
		}
		appNodes.on('click', function(event, d) {
			if (d._dragged) { d._dragged = false; return; }
			if (d.url) {
				window.location.href = d.url;
			}
		});

		// ====== AKTUALIZACJA POZYCJI ======
		function updateLayout() {
			link.each(function(d) {
				const e = endpoints(d);
				d3.select(this)
					.attr('x1', e.x1).attr('y1', e.y1)
					.attr('x2', e.x2).attr('y2', e.y2);
			});
			node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
		}

		// === START: ułóż węzły i narysuj ===
		layoutNodes();
		updateLayout();

		// ====== RESIZE / OBRÓT ======
		function handleResize() {
			const s = getSize();
			W = s.W; H = s.H;
			svg.attr('viewBox', '0 0 ' + W + ' ' + H);
			layoutNodes();
			updateLayout();
		}
		window.addEventListener('resize', handleResize);
		window.addEventListener('orientationchange', () => setTimeout(handleResize, 200));

		// Blokuj domyślne gesty przeglądarek mobilnych
		document.addEventListener('gesturestart', e => e.preventDefault());
		document.addEventListener('touchmove', e => {
			if (e.touches.length > 1 || e.target.closest('.neuron-launcher')) {
				e.preventDefault();
			}
		}, { passive: false });
	})();
	</script>

</body>
</html>
