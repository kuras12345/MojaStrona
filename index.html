<!DOCTYPE HTML>
<html lang="pl">
<head>

	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

	<title>Moja strona</title>

	<meta name="description" content="Serwis o starych grach pochodzących z Nintendo Entertainment System" />
	<meta name="keywords" content="gry, komputerowe, retro, nes, konsole, retrogranie, stare gry" />

	<!-- Ikony Tabler dla aplikacji w sieci węzłów -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">

	<style>
		/* === FULL SCREEN — strona bez marginesów, bez paska przewijania === */
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #0d0d0d;
		}

		/* === LAUNCHER — wypełnia cały viewport === */
		.neuron-launcher {
			position: fixed;
			inset: 0;
			background: radial-gradient(circle at 50% 50%, #1f1f1f 0%, #0a0a0a 100%);
			overflow: hidden;
			z-index: 1;
		}
		.neuron-launcher svg {
			width: 100%;
			height: 100%;
			display: block;
			cursor: grab;
		}
		.neuron-launcher svg:active {
			cursor: grabbing;
		}

		/* === Pasek z informacją + reset (na dole) === */
		.launcher-bar {
			position: fixed;
			bottom: 24px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 10;
			display: flex;
			gap: 28px;
			align-items: center;
			background: rgba(13, 13, 13, 0.7);
			backdrop-filter: blur(8px);
			-webkit-backdrop-filter: blur(8px);
			padding: 20px 36px;
			border-radius: 50px;
			border: 1px solid rgba(255,255,255,0.08);
		}
		.launcher-bar .info {
			font-size: 32px;
			color: #ddd;
			font-family: Arial, sans-serif;
		}
		.launcher-bar button {
			font-size: 30px;
			padding: 14px 36px;
			background: rgba(255,255,255,0.1);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.2);
			border-radius: 40px;
			cursor: pointer;
			font-family: Arial, sans-serif;
		}
		.launcher-bar button:hover {
			background: rgba(255,255,255,0.18);
		}

		/* === Tooltip z nazwą aplikacji === */
		.neuron-tooltip {
			position: fixed;
			background: #fff;
			color: #222;
			padding: 6px 12px;
			border-radius: 6px;
			font-size: 13px;
			font-family: Arial, sans-serif;
			pointer-events: none;
			opacity: 0;
			transition: opacity 0.15s;
			box-shadow: 0 2px 12px rgba(0,0,0,0.5);
			white-space: nowrap;
			z-index: 100;
		}
		.neuron-tooltip.visible {
			opacity: 1;
		}
		.app-clickable {
			cursor: pointer !important;
		}
	</style>
</head>

<body>

	<!-- LAUNCHER — full screen sieć aplikacji -->
	<div class="neuron-launcher">
		<svg id="graph"></svg>
	</div>

	<!-- Pasek informacji i reset (overlay na dole) -->
	<div class="launcher-bar">
		<span class="info">Przeciągnij węzły · scroll = zoom · klik ikony = pobierz</span>
		<button id="reset-btn">Reset</button>
	</div>

	<!-- Tooltip z nazwą aplikacji -->
	<div class="neuron-tooltip" id="tooltip"></div>

	<!-- D3.js -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
	<script>
	(function() {
		// === KATEGORIE ===
		const cats = [
			{ id: 'android', label: 'Android',  color: '#1D9E75' },
			{ id: 'ios',     label: 'iOS',      color: '#378ADD' }
		];

		// === APLIKACJE ===
		// Pole `url`  = link do pobrania (kliknięcie ikony otworzy/pobierze plik)
		// Pole `name` = nazwa wyświetlana w tooltipie i pod ikoną
		// Pole `icon` = ikona z https://tabler-icons.io/ (bez prefiksu "ti-")
		const apps = [
			{
				id:   'sygnic',
				cat:  'android',
				name: 'Sygnic Truck',
				icon: 'truck',
				url:  'https://github.com/kuras12345/moje-lfs-projekt/raw/main/nawigacja.apk'
			},
			{
				id:   'zoomnotes',
				cat:  'ios',
				name: 'ZoomNotes',
				icon: 'notes',
				url:  'https://github.com/kuras12345/moje-lfs-projekt/raw/main/ZoomNotes.ipa'
			}
			// Żeby dodać kolejną apkę, skopiuj blok powyżej. Przykład:
			// { id: 'mojaApka', cat: 'android', name: 'Moja Apka', icon: 'device-mobile', url: 'https://...' }
		];

		const nodes = [
			...cats.map(c => ({ id: c.id, label: c.label, type: 'cat', color: c.color, r: 38 })),
			...apps.map(a => ({
				id:    a.id,
				name:  a.name,
				icon:  a.icon,
				url:   a.url,
				type:  'app',
				color: cats.find(c => c.id === a.cat).color,
				r:     26
			}))
		];

		const links = apps.map(a => ({ source: a.cat, target: a.id }));
		links.push({ source: 'android', target: 'ios' });

		const svg = d3.select('#graph');
		const tooltip = document.getElementById('tooltip');

		function getSize() {
			return { W: window.innerWidth, H: window.innerHeight };
		}
		let { W, H } = getSize();
		svg.attr('viewBox', '0 0 ' + W + ' ' + H);

		const g = svg.append('g');

		// Zoom + pan
		const zoom = d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform));
		svg.call(zoom);

		// Symulacja fizyki
		const sim = d3.forceSimulation(nodes)
			.force('link', d3.forceLink(links).id(d => d.id).distance(d => d.target.type === 'app' ? 130 : 220).strength(0.5))
			.force('charge', d3.forceManyBody().strength(-600))
			.force('center', d3.forceCenter(W / 2, H / 2))
			.force('collide', d3.forceCollide().radius(d => d.r + 14));

		// Linie
		const link = g.append('g')
			.attr('stroke', 'rgba(255,255,255,0.25)')
			.attr('stroke-opacity', 0.7)
			.selectAll('line').data(links).join('line').attr('stroke-width', 1.4);

		// Węzły
		const node = g.append('g').selectAll('g').data(nodes).join('g')
			.attr('class', d => d.type === 'app' && d.url ? 'app-clickable' : '')
			.call(d3.drag()
				.on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; d._dragged = false; })
				.on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; d._dragged = true; })
				.on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

		// Kategorie
		node.filter(d => d.type === 'cat')
			.append('rect')
			.attr('x', -65).attr('y', -19)
			.attr('width', 130).attr('height', 38)
			.attr('rx', 19)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.2)');

		node.filter(d => d.type === 'cat')
			.append('text')
			.attr('text-anchor', 'middle')
			.attr('dy', 5)
			.attr('font-size', 15)
			.attr('font-weight', 500)
			.attr('fill', 'white')
			.attr('font-family', 'Arial, sans-serif')
			.text(d => d.label);

		// Aplikacje
		const appNodes = node.filter(d => d.type === 'app');

		appNodes.append('rect')
			.attr('x', -26).attr('y', -26)
			.attr('width', 52).attr('height', 52)
			.attr('rx', 13)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.25)');

		appNodes.each(function(d) {
			const fo = d3.select(this).append('foreignObject')
				.attr('x', -16).attr('y', -16).attr('width', 32).attr('height', 32);
			fo.append('xhtml:div')
				.style('width', '32px').style('height', '32px')
				.style('display', 'flex').style('align-items', 'center').style('justify-content', 'center')
				.style('color', 'white').style('font-size', '26px')
				.style('pointer-events', 'none')
				.html('<i class="ti ti-' + d.icon + '" aria-hidden="true"></i>');
		});

		// Etykieta pod ikoną aplikacji
		appNodes.append('text')
			.attr('text-anchor', 'middle')
			.attr('dy', 44)
			.attr('font-size', 11)
			.attr('fill', 'rgba(255,255,255,0.85)')
			.attr('font-family', 'Arial, sans-serif')
			.attr('pointer-events', 'none')
			.text(d => d.name);

		// Tooltip + klik
		appNodes
			.on('mouseenter', function(event, d) {
				if (!d.name) return;
				tooltip.textContent = d.name;
				tooltip.style.left = (event.clientX + 14) + 'px';
				tooltip.style.top  = (event.clientY - 32) + 'px';
				tooltip.classList.add('visible');
			})
			.on('mousemove', function(event) {
				tooltip.style.left = (event.clientX + 14) + 'px';
				tooltip.style.top  = (event.clientY - 32) + 'px';
			})
			.on('mouseleave', function() {
				tooltip.classList.remove('visible');
			})
			.on('click', function(event, d) {
				if (d._dragged) { d._dragged = false; return; }
				if (d.url) {
					window.location.href = d.url;
				}
			});

		// Tick
		sim.on('tick', () => {
			link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
				.attr('x2', d => d.target.x).attr('y2', d => d.target.y);
			node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
		});

		// Reset
		document.getElementById('reset-btn').addEventListener('click', () => {
			nodes.forEach(n => { n.fx = null; n.fy = null; });
			sim.alpha(1).restart();
			svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
		});

		// Reaguj na zmianę rozmiaru okna
		window.addEventListener('resize', () => {
			const s = getSize();
			W = s.W; H = s.H;
			svg.attr('viewBox', '0 0 ' + W + ' ' + H);
			sim.force('center', d3.forceCenter(W / 2, H / 2));
			sim.alpha(0.3).restart();
		});
	})();
	</script>

</body>
</html>
