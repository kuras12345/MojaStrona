<!DOCTYPE HTML>
<html lang="pl">
<head>

	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

	<title>Moja strona</title>

	<meta name="description" content="Serwis o starych grach pochodzących z Nintendo Entertainment System" />
	<meta name="keywords" content="gry, komputerowe, retro, nes, konsole, retrogranie, stare gry" />

	<link href="style.css" rel="stylesheet" type="text/css" />
	<link href="jQueryAssets/jquery.ui.core.min.css" rel="stylesheet" type="text/css">
	<link href="jQueryAssets/jquery.ui.theme.min.css" rel="stylesheet" type="text/css">
	<link href="jQueryAssets/jquery.ui.button.min.css" rel="stylesheet" type="text/css">

	<!-- Ikony Tabler dla aplikacji w sieci węzłów -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">

	<style>
		/* Style dla sieci węzłów (Neuron Launcher) */
		.neuron-launcher {
			background: #1a1a1a;
			border-radius: 12px;
			padding: 0;
			margin: 20px auto;
			max-width: 900px;
			position: relative;
			overflow: hidden;
			box-shadow: 0 4px 20px rgba(0,0,0,0.3);
		}
		.neuron-launcher .info {
			position: absolute;
			top: 12px;
			left: 16px;
			z-index: 10;
			font-size: 13px;
			color: #aaa;
			font-family: Arial, sans-serif;
		}
		.neuron-launcher .controls {
			position: absolute;
			top: 12px;
			right: 16px;
			z-index: 10;
			display: flex;
			gap: 8px;
		}
		.neuron-launcher .controls button {
			font-size: 12px;
			padding: 6px 14px;
			background: rgba(255,255,255,0.08);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.15);
			border-radius: 6px;
			cursor: pointer;
			font-family: Arial, sans-serif;
		}
		.neuron-launcher .controls button:hover {
			background: rgba(255,255,255,0.15);
		}
		.neuron-launcher svg {
			width: 100%;
			height: 600px;
			display: block;
			cursor: grab;
		}
		.neuron-launcher svg:active {
			cursor: grabbing;
		}
		/* Tooltip pokazywany po najechaniu na aplikację */
		.neuron-tooltip {
			position: absolute;
			background: #fff;
			color: #222;
			padding: 6px 10px;
			border-radius: 6px;
			font-size: 12px;
			font-family: Arial, sans-serif;
			pointer-events: none;
			opacity: 0;
			transition: opacity 0.15s;
			box-shadow: 0 2px 8px rgba(0,0,0,0.4);
			white-space: nowrap;
			z-index: 20;
		}
		.neuron-tooltip.visible {
			opacity: 1;
		}
		/* Aplikacje, które mają link, mają wskaźnik "rączki" */
		.app-clickable {
			cursor: pointer !important;
		}
		.neuron-title {
			text-align: center;
			color: #c34f4f;
			font-family: Arial, sans-serif;
			font-size: 22px;
			margin: 30px 0 10px;
		}
	</style>

	<script src="jQueryAssets/jquery-1.11.1.min.js"></script>
	<script src="jQueryAssets/jquery.ui-1.10.4.button.min.js"></script>
</head>

<body>

	<div class="header" style="text-align: center;">

		<div class="logo">

			<span style="color: #c34f4f">Moja</span>strona
			<div style="clear:both;"></div>
		</div>
	</div>
	<div class="nav">
		<ol>
		<!--	<li><a href="#">Strona główna</a></li> -->
			<li><a href="#">Android</a><ul>

					<li><a href="https://github.com/kuras12345/moje-lfs-projekt/raw/main/nawigacja.apk">Sygnic Truck</a></li>
					<li><a href="#"></a></li>
					<li><a href="#"></a></li>
				</ul>
			</li>
			<li><a href="#">IOS</a>
				<ul>
					<li><a href="https://github.com/kuras12345/moje-lfs-projekt/raw/main/ZoomNotes.ipa">ZoomNotes</a></li>
				</ul>


		</ol>

	</div>

	<div class="content">

		<h2 class="neuron-title">Sieć aplikacji</h2>

		<!-- Sieć węzłów - Neuron Launcher -->
		<div class="neuron-launcher">
			<div class="info">Przeciągnij węzły · scroll = zoom · kliknij ikonę aplikacji żeby pobrać</div>
			<div class="controls">
				<button id="reset-btn">Reset</button>
			</div>
			<svg id="graph"></svg>
			<div class="neuron-tooltip" id="tooltip"></div>
		</div>

	</div>

	<!-- D3.js dla sieci węzłów -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
	<script>
	(function() {
		// === KATEGORIE (większe pigułki) ===
		const cats = [
			{ id: 'android', label: 'Android',  color: '#1D9E75' },
			{ id: 'ios',     label: 'iOS',      color: '#378ADD' }
		];

		// === APLIKACJE ===
		// Pole `url`  = link do pobrania (kliknięcie ikony otworzy/pobierze plik)
		// Pole `name` = nazwa wyświetlana w tooltipie
		// Pole `icon` = ikona z https://tabler-icons.io/ (bez prefiksu "ti-")
		const apps = [
			{
				id:   'sygnic',
				cat:  'android',
				name: 'Sygnic Truck',
				icon: 'truck',
				url:  'https://github.com/kuras12345/moje-lfs-projekt/raw/main/nawigacja.apk'
			},
			{
				id:   'zoomnotes',
				cat:  'ios',
				name: 'ZoomNotes',
				icon: 'notes',
				url:  'https://github.com/kuras12345/moje-lfs-projekt/raw/main/ZoomNotes.ipa'
			}
			// Żeby dodać kolejną aplikację, skopiuj jeden blok powyżej i zmień pola.
			// Np.:
			// { id: 'mojaApka', cat: 'android', name: 'Moja Apka', icon: 'device-mobile', url: 'https://...' }
		];

		const nodes = [
			...cats.map(c => ({ id: c.id, label: c.label, type: 'cat', color: c.color, r: 34 })),
			...apps.map(a => ({
				id:    a.id,
				name:  a.name,
				icon:  a.icon,
				url:   a.url,
				type:  'app',
				color: cats.find(c => c.id === a.cat).color,
				r:     22
			}))
		];

		const links = apps.map(a => ({ source: a.cat, target: a.id }));
		// Łączymy też kategorie ze sobą (linia między Android i iOS)
		links.push({ source: 'android', target: 'ios' });

		const svg = d3.select('#graph');
		const W = svg.node().clientWidth || 900;
		const H = 600;
		svg.attr('viewBox', `0 0 ${W} ${H}`);

		const g = svg.append('g');
		const tooltip = document.getElementById('tooltip');
		const launcherEl = document.querySelector('.neuron-launcher');

		// Zoom + pan
		svg.call(d3.zoom().scaleExtent([0.4, 3]).on('zoom', e => g.attr('transform', e.transform)));

		// Symulacja fizyki
		const sim = d3.forceSimulation(nodes)
			.force('link', d3.forceLink(links).id(d => d.id).distance(d => d.target.type === 'app' ? 90 : 160).strength(0.7))
			.force('charge', d3.forceManyBody().strength(-320))
			.force('center', d3.forceCenter(W / 2, H / 2))
			.force('collide', d3.forceCollide().radius(d => d.r + 10));

		// Linie (krawędzie)
		const link = g.append('g')
			.attr('stroke', 'rgba(255,255,255,0.3)')
			.attr('stroke-opacity', 0.7)
			.selectAll('line').data(links).join('line').attr('stroke-width', 1.4);

		// Węzły
		const node = g.append('g').selectAll('g').data(nodes).join('g')
			.attr('class', d => d.type === 'app' && d.url ? 'app-clickable' : '')
			.call(d3.drag()
				.on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; d._dragged = false; })
				.on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; d._dragged = true; })
				.on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

		// === KATEGORIE: pigułka z tekstem ===
		node.filter(d => d.type === 'cat')
			.append('rect')
			.attr('x', -55).attr('y', -16)
			.attr('width', 110).attr('height', 32)
			.attr('rx', 16)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.2)');

		node.filter(d => d.type === 'cat')
			.append('text')
			.attr('text-anchor', 'middle')
			.attr('dy', 5)
			.attr('font-size', 13)
			.attr('font-weight', 500)
			.attr('fill', 'white')
			.attr('font-family', 'Arial, sans-serif')
			.text(d => d.label);

		// === APLIKACJE: kwadrat z ikoną ===
		const appNodes = node.filter(d => d.type === 'app');

		appNodes.append('rect')
			.attr('x', -22).attr('y', -22)
			.attr('width', 44).attr('height', 44)
			.attr('rx', 11)
			.attr('fill', d => d.color)
			.attr('stroke', 'rgba(255,255,255,0.25)');

		appNodes.each(function(d) {
			const fo = d3.select(this).append('foreignObject')
				.attr('x', -14).attr('y', -14).attr('width', 28).attr('height', 28);
			fo.append('xhtml:div')
				.style('width', '28px').style('height', '28px')
				.style('display', 'flex').style('align-items', 'center').style('justify-content', 'center')
				.style('color', 'white').style('font-size', '22px')
				.style('pointer-events', 'none')   // ważne — kliknięcie idzie na grupę, nie na div
				.html('<i class="ti ti-' + d.icon + '" aria-hidden="true"></i>');
		});

		// === TOOLTIP — po najechaniu pokazuje nazwę aplikacji ===
		appNodes
			.on('mouseenter', function(event, d) {
				if (!d.name) return;
				const rect = launcherEl.getBoundingClientRect();
				tooltip.textContent = d.name;
				tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
				tooltip.style.top  = (event.clientY - rect.top - 32) + 'px';
				tooltip.classList.add('visible');
			})
			.on('mousemove', function(event) {
				const rect = launcherEl.getBoundingClientRect();
				tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
				tooltip.style.top  = (event.clientY - rect.top - 32) + 'px';
			})
			.on('mouseleave', function() {
				tooltip.classList.remove('visible');
			})
			// === KLIKNIĘCIE — pobiera plik z `url` ===
			.on('click', function(event, d) {
				if (d._dragged) { d._dragged = false; return; } // ignoruj klik po przeciągnięciu
				if (d.url) {
					window.location.href = d.url;
				}
			});

		// Aktualizacja pozycji w każdej klatce
		sim.on('tick', () => {
			link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
				.attr('x2', d => d.target.x).attr('y2', d => d.target.y);
			node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
		});

		// Reset układu
		document.getElementById('reset-btn').addEventListener('click', () => {
			nodes.forEach(n => { n.fx = null; n.fy = null; });
			sim.alpha(1).restart();
			svg.transition().duration(400).call(
				d3.zoom().transform, d3.zoomIdentity
			);
		});
	})();
	</script>

</body>
</html>
